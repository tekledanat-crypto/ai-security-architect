name: Security

# A security tool that doesn't scan itself is a poor advertisement. Every scanner here
# maps to a control this product checks other people's architectures against.
#
# Findings upload to GitHub code scanning (SARIF) rather than only failing the build,
# so issues are triageable rather than a wall of red.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: catches newly-disclosed CVEs in unchanged code.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── SAST: first-party code ──
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ── Python-specific SAST ──
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit[sarif]
      - name: Run Bandit
        # -ll: report medium+ severity. Tests are excluded: assert usage there is intended.
        run: |
          bandit -r backend/app mcp-server/app -ll -f sarif -o bandit.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

  # ── Multi-language SAST with security-focused rulesets ──
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/python \
            --config=p/typescript \
            --config=p/owasp-top-ten \
            --sarif --output=semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── Secret detection. This one FAILS the build: a committed credential is not a
  # "finding to triage", it is an incident.
  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — secrets hide in old commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency + container vulnerabilities ──
  trivy-deps:
    name: Trivy (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan filesystem for vulnerable dependencies
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-images:
    name: Trivy (container images)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: docker/backend.Dockerfile
          - name: mcp-server
            dockerfile: docker/mcp-server.Dockerfile
          - name: frontend
            dockerfile: docker/frontend.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: scan-target:${{ matrix.name }}
          cache-from: type=gha
      - name: Scan image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: scan-target:${{ matrix.name }}
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

  # ── IaC scanning. The irony of shipping insecure Bicep from a tool that reviews
  # Azure security is not lost on us — hence this job.
  checkov:
    name: Checkov (IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Checkov against Bicep
        uses: bridgecrewio/checkov-action@v12.2947.0
        with:
          directory: infra
          framework: bicep
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ── Verifies the app's own governance claims still hold. Chunk 9 wrote docs that
  # cite specific files and tests; this proves those citations stay true.
  governance-claims:
    name: Governance claims are verifiable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify every file cited in governance docs exists
        run: python scripts/verify_governance_claims.py
